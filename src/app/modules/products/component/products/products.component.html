<h2>Product Search</h2>
<input type="text" [formControl]="searchControl" placeholder="Search products" />
<p *ngIf="(products$ | async)?.length === 0"> No products found </p>
<ul>
  <li *ngFor="let product of products$ | async"> {{ product.title }} — {{ product.price | currency }} </li>


</ul>

<button (click)="deleteProducts([1,2,3,4,5,6,7,8,9])">Delete Products</button>
<button (click)="updateProducts()">Update Products</button>
