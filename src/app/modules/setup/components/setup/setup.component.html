<h1>Template Driven Form</h1>

<form #productSetupForm="ngForm" (ngSubmit)="onSubmit(productSetupForm)">

  <input appCustomValidation id="title" name="title" [(ngModel)]="product.title" #title="ngModel"/>

  <p *ngIf="title.invalid">Title is Required</p>

  <input appCustomValidation id="description" name="description" required  ngModel #description="ngModel"/>

  <select  id="category" name="category" ngModel #category="ngModel" required>
    <option [ngValue]="null">Select category</option>
    <option *ngFor="let c of categories" [ngValue]="c.id">
      {{ c.name }}
    </option>
  </select>
  <p *ngIf="category.valid"></p>
  <input id="price" name="price" required ngModel #price="ngModel"/>
  <p *ngIf="price.invalid && price.touched">Price is Required</p>


  <div ngModelGroup="address">
    <input id="no" name="no" required  ngModel #no="ngModel"/>
    <input id="street" name="street" required  ngModel #street="ngModel"/>
    <input id="city" name="city" required  ngModel #city="ngModel"/>
    <input id="country" name="country" required  ngModel #country="ngModel"/>
  </div>

  <div ngModelGroup="supplier">
    <input id="name" name="name" placeholder="name" required [minlength]="10" ngModel #name="ngModel"/>

    <p *ngIf="name.touched && name.invalid">
      Supplier Name is Required with length
    </p>

    <p *ngIf="name.errors?.['required'] && name.touched">
      Supplier Name is Required
    </p>

    <p *ngIf="name.errors?.['minlength'] && name.touched">
      Supplier Name is Required 10 characters
    </p>

    <div ngModelGroup="address">
      <input id="no" name="no" required  placeholder="no"  ngModel #supplierAddressNo="ngModel"/>
      <p *ngIf="supplierAddressNo.touched && supplierAddressNo.invalid">
        Supplier Address No is Required
      </p>
      <input id="street" name="street" required  placeholder="street" ngModel #street="ngModel"/>
      <input id="city" name="city" required   placeholder="city"  ngModel #city="ngModel"/>
      <input id="country" name="country" required  ngModel #country="ngModel"/>
    </div>
  </div>

  <div
   *ngFor="let productSkill of product.skills; index as index">
    <input
      required
      [minlength]="5" [id]="'skill' + index"
      [name]="'skill' + index" [(ngModel)]="productSkill.name"
      #skill="ngModel"/>
    <button type="button" (click)="removeSkill(index)">Remove</button>
    <p *ngIf="skill.invalid && skill.touched">
     Skill {{ index }} is Required
    </p>
  </div>

  <button type="button" (click)="addSkill()">Add</button>




  <button type="submit">Submit</button>
</form>
