<div class="products-header">
  <h2>Featured Products</h2>
</div>

<div class="products-grid">

  <div class="product-card" *ngFor="let product of products">

    <img [src]="product.image" alt="">

    <h5>{{ product.name }}</h5>

    <div class="price">
      ${{ product.price }}
    </div>

    <button>Add to Cart</button>

  </div>

</div>
